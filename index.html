<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brahmi Face Filters + Emotion Detector</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #output-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #webcam-video { display: none; }

        #emotion-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            pointer-events: none;
        }
        #emotion-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.15);
            transition: all 0.3s ease;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        #emotion-emoji { font-size: 1.5rem; }

        #filter-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 12px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            justify-content: center;
            flex-wrap: nowrap;
        }
        .fbtn {
            flex-shrink: 0;
            width: 68px; height: 68px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            padding: 0;
        }
        .fbtn.active {
            border-color: #FFD700;
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 16px rgba(255,215,0,0.4);
            transform: scale(1.08);
        }
        .fbtn:active { transform: scale(0.92); }
        .fbtn .ico { font-size: 1.5rem; line-height: 1; }
        .fbtn .lbl {
            font-size: 0.5rem;
            font-weight: 700;
            margin-top: 1px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .fbtn .thumb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 30%;
        }
        .fbtn.has-thumb .lbl {
            position: absolute;
            bottom: 2px;
            font-size: 0.45rem;
            background: rgba(0,0,0,0.6);
            padding: 1px 6px;
            border-radius: 8px;
        }
        .fbtn.has-thumb {
            position: relative;
        }

        #mesh-toggle {
            position: absolute;
            top: 12px; right: 12px;
            z-index: 10;
            width: 42px; height: 42px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }
        #mesh-toggle.active {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.25);
        }

        #loading-message {
            position: absolute;
            z-index: 20;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading-message">Requesting Camera Access...</div>

        <div id="emotion-bar">
            <div id="emotion-pill">
                <span id="emotion-emoji">😐</span>
                <span id="emotion-label">Neutral</span>
            </div>
        </div>

        <button id="mesh-toggle" title="Toggle face mesh">🕸</button>

        <video id="webcam-video" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>

        <div id="filter-bar">
            <button class="fbtn active" data-filter="none">
                <span class="ico">🚫</span>
                <span class="lbl">None</span>
            </button>
            <button class="fbtn has-thumb" data-filter="serious">
                <img src="img/brahmi-serious.jpg" class="thumb" alt="Serious">
                <span class="lbl">Serious</span>
            </button>
            <button class="fbtn has-thumb" data-filter="pandit">
                <img src="img/brahmi-pandit.jpg" class="thumb" alt="Pandit">
                <span class="lbl">Pandit</span>
            </button>
            <button class="fbtn has-thumb" data-filter="shocked">
                <img src="img/brahmi-shocked.jpg" class="thumb" alt="Shocked">
                <span class="lbl">Shocked</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <script>
        var videoElement = document.getElementById('webcam-video');
        var canvasElement = document.getElementById('output-canvas');
        var ctx = canvasElement.getContext('2d');
        var loadingMessage = document.getElementById('loading-message');
        var emotionEmoji = document.getElementById('emotion-emoji');
        var emotionLabel = document.getElementById('emotion-label');
        var emotionPill = document.getElementById('emotion-pill');

        var activeFilter = 'none';
        var showMesh = true;

        // --- MASK IMAGE CONFIG ---
        // cx, cy = face center as fraction of image; fw = face width as fraction of image width
        var maskConfigs = {
            serious: { src: 'img/brahmi-serious.jpg', cx: 0.43, cy: 0.42, fw: 0.36 },
            pandit:  { src: 'img/brahmi-pandit.jpg',  cx: 0.50, cy: 0.64, fw: 0.30 },
            shocked: { src: 'img/brahmi-shocked.jpg',  cx: 0.48, cy: 0.43, fw: 0.30 }
        };

        // Preload mask images
        var maskImages = {};
        Object.keys(maskConfigs).forEach(function(key) {
            var img = new Image();
            img.crossOrigin = 'anonymous';
            img.src = maskConfigs[key].src;
            maskImages[key] = img;
        });

        // --- UI HANDLERS ---
        document.querySelectorAll('.fbtn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelector('.fbtn.active').classList.remove('active');
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
            });
        });
        document.getElementById('mesh-toggle').addEventListener('click', function() {
            showMesh = !showMesh;
            this.classList.toggle('active');
        });

        // --- UTILITY ---
        function dist(a, b) {
            var dx = a.x - b.x, dy = a.y - b.y;
            return Math.sqrt(dx * dx + dy * dy);
        }
        function pt(lm, i, w, h) {
            return { x: lm[i].x * w, y: lm[i].y * h };
        }
        function mid(a, b) {
            return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
        }

        // --- EMOTION DETECTION (5 emotions) ---
        function detectEmotion(face) {
            if (!face) return { emotion: 'No Face', emoji: '👻', color: '#888' };

            var faceW = dist(face[234], face[454]);
            var faceH = dist(face[10], face[152]);

            var mouthW = dist(face[61], face[291]);
            var mouthOpen = dist(face[13], face[14]);
            var mwRatio = mouthW / faceW;
            var moRatio = mouthOpen / faceH;

            var avgCornerY = (face[61].y + face[291].y) / 2;
            var frownRatio = (avgCornerY - face[14].y) / faceH;

            var lBrow = face[159].y - face[105].y;
            var rBrow = face[386].y - face[334].y;
            var browRaise = (lBrow + rBrow) / (2 * faceH);

            var innerBrowDist = dist(face[107], face[336]);
            var innerBrowRatio = innerBrowDist / faceW;

            if (browRaise > 0.065 && moRatio > 0.055) {
                return { emotion: 'Surprised', emoji: '😲', color: '#FFD700' };
            }
            if (mwRatio > 0.43) {
                return { emotion: 'Happy', emoji: '😊', color: '#4CAF50' };
            }
            if (innerBrowRatio < 0.115 && mwRatio < 0.36 && browRaise < 0.04) {
                return { emotion: 'Angry', emoji: '😠', color: '#F44336' };
            }
            if (frownRatio > 0.018) {
                return { emotion: 'Sad', emoji: '😢', color: '#2196F3' };
            }
            return { emotion: 'Neutral', emoji: '😐', color: '#9E9E9E' };
        }

        // --- FACE MASK OVERLAY ---
        function drawFaceMask(c, lm, w, h, maskKey) {
            var config = maskConfigs[maskKey];
            var img = maskImages[maskKey];
            if (!img || !img.complete || !img.naturalWidth) return;

            // User's face bounding points
            var lf = pt(lm, 234, w, h);
            var rf = pt(lm, 454, w, h);
            var tf = pt(lm, 10, w, h);
            var cf = pt(lm, 152, w, h);

            // User face center and dimensions
            var ucx = (lf.x + rf.x) / 2;
            var ucy = (tf.y + cf.y) / 2;
            var ufw = rf.x - lf.x;
            var ufh = cf.y - tf.y;

            // Face rotation from eye positions
            var lEye = mid(pt(lm, 33, w, h), pt(lm, 133, w, h));
            var rEye = mid(pt(lm, 263, w, h), pt(lm, 362, w, h));
            var angle = Math.atan2(rEye.y - lEye.y, rEye.x - lEye.x);

            // Scale: map source face width to user face width (with padding)
            var scale = (ufw * 1.35) / (config.fw * img.naturalWidth);

            // Source face center in pixels
            var scx = config.cx * img.naturalWidth;
            var scy = config.cy * img.naturalHeight;

            // Ellipse radii for clipping
            var rx = ufw * 0.72;
            var ry = ufh * 0.62;

            c.save();

            // Move to face center, rotate, then clip and draw
            c.translate(ucx, ucy);
            c.rotate(angle);

            // Elliptical clip
            c.beginPath();
            c.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
            c.clip();

            // Draw mask image centered on face
            var dw = img.naturalWidth * scale;
            var dh = img.naturalHeight * scale;
            var dx = -scx * scale;
            var dy = -scy * scale;
            c.drawImage(img, dx, dy, dw, dh);

            // Soft edge: draw a fading ring around the ellipse border
            var grad = c.createRadialGradient(0, 0, Math.min(rx, ry) * 0.75, 0, 0, Math.max(rx, ry) * 1.05);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(0.6, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.6)');
            c.fillStyle = grad;
            c.fillRect(-rx * 1.5, -ry * 1.5, rx * 3, ry * 3);

            c.restore();
        }

        // --- MEDIAPIPE SETUP ---
        var holistic = new Holistic({
            locateFile: function(file) {
                return 'https://cdn.jsdelivr.net/npm/@mediapipe/holistic/' + file;
            }
        });
        holistic.setOptions({
            static_image_mode: false,
            model_complexity: 1,
            smooth_landmarks: true,
            refine_face_landmarks: true,
            min_detection_confidence: 0.5,
            min_tracking_confidence: 0.5
        });
        holistic.onResults(onResults);

        // --- MAIN RENDER LOOP ---
        function onResults(results) {
            loadingMessage.style.display = 'none';

            var w = videoElement.videoWidth;
            var h = videoElement.videoHeight;
            if (canvasElement.width !== w) { canvasElement.width = w; canvasElement.height = h; }

            // Emotion detection
            var emo = detectEmotion(results.faceLandmarks);
            emotionEmoji.textContent = emo.emoji;
            emotionLabel.textContent = emo.emotion;
            emotionPill.style.borderColor = emo.color;

            // Clear
            ctx.save();
            ctx.clearRect(0, 0, w, h);

            // Mirror flip
            ctx.translate(w, 0);
            ctx.scale(-1, 1);

            // Draw video
            if (results.image) {
                ctx.drawImage(results.image, 0, 0, w, h);
            }

            // Draw mesh (optional)
            if (showMesh) {
                drawConnectors(ctx, results.faceLandmarks, FACEMESH_TESSELATION, { color: '#C0C0C070', lineWidth: 1 });
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
                drawLandmarks(ctx, results.poseLandmarks, { color: '#FF0000', lineWidth: 2, radius: 2 });
                drawConnectors(ctx, results.leftHandLandmarks, HAND_CONNECTIONS, { color: '#CC0000', lineWidth: 5 });
                drawLandmarks(ctx, results.leftHandLandmarks, { color: '#FF0000', lineWidth: 2, radius: 2 });
                drawConnectors(ctx, results.rightHandLandmarks, HAND_CONNECTIONS, { color: '#00CC00', lineWidth: 5 });
                drawLandmarks(ctx, results.rightHandLandmarks, { color: '#00FF00', lineWidth: 2, radius: 2 });
            }

            // Draw face mask filter (in mirrored space so it tracks the face)
            if (activeFilter !== 'none' && results.faceLandmarks) {
                drawFaceMask(ctx, results.faceLandmarks, w, h, activeFilter);
            }

            // Flip back for UI overlays
            ctx.translate(w, 0);
            ctx.scale(-1, 1);

            // Floating emoji above head
            if (results.faceLandmarks && emo.emotion !== 'Neutral' && emo.emotion !== 'No Face') {
                var headX = w - (results.faceLandmarks[10].x * w);
                var headY = (results.faceLandmarks[10].y * h) - 60;
                ctx.font = '60px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(emo.emoji, headX, headY);
            }

            ctx.restore();
        }

        // --- START WEBCAM ---
        function startWebcam() {
            var camera = new Camera(videoElement, {
                onFrame: async function() {
                    if (videoElement.readyState >= 2) {
                        await holistic.send({ image: videoElement });
                    }
                },
                facingMode: 'user'
            });
            camera.start()
                .then(function() { console.log('MediaPipe initialized.'); })
                .catch(function(err) {
                    console.error('Camera start failed:', err);
                    loadingMessage.innerText = 'Camera Access Denied or Unavailable.';
                });
        }
        window.onload = startWebcam;
    </script>
</body>
</html>
