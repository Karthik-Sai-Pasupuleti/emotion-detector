<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brahmi Face Warp + Emotions</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #1a1a2e; color: white;
            font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        .container { position: relative; width: 100vw; height: 100vh; }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        #webcam-video { display: none; }
        #emotion-bar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            padding: 14px 16px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            pointer-events: none;
        }
        #emotion-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 18px; border-radius: 30px; font-size: 1.2rem; font-weight: 700;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.15); transition: all 0.3s ease;
        }
        #emotion-emoji { font-size: 1.5rem; }
        #filter-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; gap: 14px;
            padding: 14px 12px 24px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            justify-content: center;
        }
        .fbtn {
            flex-shrink: 0; width: 68px; height: 68px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: white;
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
            justify-content: center; transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent; overflow: hidden; padding: 0; position: relative;
        }
        .fbtn.active { border-color: #FFD700; background: rgba(255,215,0,0.2); box-shadow: 0 0 16px rgba(255,215,0,0.4); transform: scale(1.08); }
        .fbtn:active { transform: scale(0.92); }
        .fbtn .ico { font-size: 1.5rem; }
        .fbtn .lbl { font-size: 0.5rem; font-weight: 700; margin-top: 1px; text-transform: uppercase; }
        .fbtn .thumb { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; object-position: center 30%; }
        .fbtn.has-thumb .lbl { position: absolute; bottom: 2px; font-size: 0.45rem; background: rgba(0,0,0,0.65); padding: 1px 6px; border-radius: 8px; }
        #mesh-toggle {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: white;
            font-size: 1.1rem; cursor: pointer; display: flex; align-items: center;
            justify-content: center; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease;
        }
        #mesh-toggle.active { border-color: #00d4ff; background: rgba(0,212,255,0.25); }
        #loading-message {
            position: absolute; z-index: 20; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 1.1rem; font-weight: bold;
            text-align: center; padding: 20px; line-height: 1.6;
        }
        .loading-spinner {
            display: inline-block; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #FFD700; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading-message"><div class="loading-spinner"></div><br>Loading model...</div>
        <div id="emotion-bar">
            <div id="emotion-pill">
                <span id="emotion-emoji">😐</span>
                <span id="emotion-label">Neutral</span>
            </div>
        </div>
        <button id="mesh-toggle" title="Toggle mesh">🕸</button>
        <video id="webcam-video" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <div id="filter-bar">
            <button class="fbtn active" data-filter="none"><span class="ico">🚫</span><span class="lbl">None</span></button>
            <button class="fbtn has-thumb" data-filter="serious"><img src="img/brahmi-serious.jpg" class="thumb"><span class="lbl">Serious</span></button>
            <button class="fbtn has-thumb" data-filter="pandit"><img src="img/brahmi-pandit.jpg" class="thumb"><span class="lbl">Pandit</span></button>
            <button class="fbtn has-thumb" data-filter="shocked"><img src="img/brahmi-shocked.jpg" class="thumb"><span class="lbl">Shocked</span></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <script>
    var videoEl = document.getElementById('webcam-video');
    var canvas = document.getElementById('output-canvas');
    var ctx = canvas.getContext('2d');
    var loadMsg = document.getElementById('loading-message');
    var emoPill = document.getElementById('emotion-pill');
    var emoEmoji = document.getElementById('emotion-emoji');
    var emoLabel = document.getElementById('emotion-label');

    var activeFilter = 'none';
    var showMesh = true;
    var triangles = null;

    var warpCvs = document.createElement('canvas');
    var warpCtx = warpCvs.getContext('2d');

    var KEY = [
        10, 67, 109, 234, 132, 58, 172, 152, 397, 288, 361, 454, 338, 297,
        33, 159, 145, 133, 263, 386, 374, 362,
        70, 105, 300, 334,
        1, 6, 168,
        61, 37, 0, 267, 291, 405, 17, 181,
        78, 82, 13, 312, 308, 317, 14, 87,
        205, 425, 151
    ];

    var masks = {
        serious: { src: 'img/brahmi-serious.jpg', pts: null },
        pandit:  { src: 'img/brahmi-pandit.jpg',  pts: null },
        shocked: { src: 'img/brahmi-shocked.jpg',  pts: null }
    };
    var maskImgs = {};
    Object.keys(masks).forEach(function(k) {
        var im = new Image();
        im.crossOrigin = 'anonymous';
        im.src = masks[k].src;
        maskImgs[k] = im;
    });

    var dstBuf = KEY.map(function() { return { x: 0, y: 0 }; });

    document.querySelectorAll('.fbtn').forEach(function(b) {
        b.addEventListener('click', function() {
            document.querySelector('.fbtn.active').classList.remove('active');
            b.classList.add('active');
            activeFilter = b.dataset.filter;
        });
    });
    document.getElementById('mesh-toggle').addEventListener('click', function() {
        showMesh = !showMesh;
        this.classList.toggle('active');
    });

    function d(a, b) { var dx = a.x - b.x, dy = a.y - b.y; return Math.sqrt(dx * dx + dy * dy); }

    function detectEmotion(f) {
        if (!f) return { e: 'No Face', m: '👻', c: '#888' };
        var fw = d(f[234], f[454]), fh = d(f[10], f[152]);
        var mw = d(f[61], f[291]) / fw, mo = d(f[13], f[14]) / fh;
        var fr = ((f[61].y + f[291].y) / 2 - f[14].y) / fh;
        var br = (f[159].y - f[105].y + f[386].y - f[334].y) / (2 * fh);
        var ib = d(f[107], f[336]) / fw;
        if (br > 0.065 && mo > 0.055) return { e: 'Surprised', m: '😲', c: '#FFD700' };
        if (mw > 0.43) return { e: 'Happy', m: '😊', c: '#4CAF50' };
        if (ib < 0.115 && mw < 0.36 && br < 0.04) return { e: 'Angry', m: '😠', c: '#F44336' };
        if (fr > 0.018) return { e: 'Sad', m: '😢', c: '#2196F3' };
        return { e: 'Neutral', m: '😐', c: '#9E9E9E' };
    }

    // --- Delaunay triangulation (Bowyer-Watson) ---
    function circumTest(p, a, b, c) {
        var ax = a.x - p.x, ay = a.y - p.y;
        var bx = b.x - p.x, by = b.y - p.y;
        var cx = c.x - p.x, cy = c.y - p.y;
        var det = (ax * ax + ay * ay) * (bx * cy - cx * by)
                - (bx * bx + by * by) * (ax * cy - cx * ay)
                + (cx * cx + cy * cy) * (ax * by - bx * ay);
        var area = (b.x - a.x) * (c.y - a.y) - (c.x - a.x) * (b.y - a.y);
        if (Math.abs(area) < 1e-10) return false;
        return area > 0 ? det > 0 : det < 0;
    }

    function computeDelaunay(pts) {
        var n = pts.length;
        if (n < 3) return [];
        var minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
        for (var i = 0; i < n; i++) {
            if (pts[i].x < minX) minX = pts[i].x;
            if (pts[i].y < minY) minY = pts[i].y;
            if (pts[i].x > maxX) maxX = pts[i].x;
            if (pts[i].y > maxY) maxY = pts[i].y;
        }
        var dm = Math.max(maxX - minX, maxY - minY) || 1;
        var mx = (minX + maxX) / 2, my = (minY + maxY) / 2;
        var all = pts.concat([
            { x: mx - 20 * dm, y: my - dm },
            { x: mx, y: my + 20 * dm },
            { x: mx + 20 * dm, y: my - dm }
        ]);
        var tris = [[n, n + 1, n + 2]];
        for (var i = 0; i < n; i++) {
            var p = all[i], bad = [];
            for (var j = 0; j < tris.length; j++) {
                if (circumTest(p, all[tris[j][0]], all[tris[j][1]], all[tris[j][2]])) bad.push(j);
            }
            var edges = [];
            for (var j = 0; j < bad.length; j++) {
                var t = tris[bad[j]];
                edges.push([t[0], t[1]], [t[1], t[2]], [t[2], t[0]]);
            }
            var bnd = [];
            for (var j = 0; j < edges.length; j++) {
                var dup = false;
                for (var k = 0; k < edges.length; k++) {
                    if (j !== k && edges[j][0] === edges[k][1] && edges[j][1] === edges[k][0]) { dup = true; break; }
                }
                if (!dup) bnd.push(edges[j]);
            }
            bad.sort(function(a, b) { return b - a; });
            for (var j = 0; j < bad.length; j++) tris.splice(bad[j], 1);
            for (var j = 0; j < bnd.length; j++) tris.push([i, bnd[j][0], bnd[j][1]]);
        }
        return tris.filter(function(t) { return t[0] < n && t[1] < n && t[2] < n; });
    }

    // --- Affine warp per triangle ---
    function warpTri(c, img, s, dst) {
        var sa = (s[1].x - s[0].x) * (s[2].y - s[0].y) - (s[2].x - s[0].x) * (s[1].y - s[0].y);
        if (Math.abs(sa) < 0.5) return;
        c.save();
        c.beginPath();
        c.moveTo(dst[0].x, dst[0].y);
        c.lineTo(dst[1].x, dst[1].y);
        c.lineTo(dst[2].x, dst[2].y);
        c.closePath();
        c.clip();
        var x0 = s[0].x, y0 = s[0].y, x1 = s[1].x, y1 = s[1].y, x2 = s[2].x, y2 = s[2].y;
        var u0 = dst[0].x, v0 = dst[0].y, u1 = dst[1].x, v1 = dst[1].y, u2 = dst[2].x, v2 = dst[2].y;
        var det = x0 * (y1 - y2) + x1 * (y2 - y0) + x2 * (y0 - y1);
        if (Math.abs(det) < 0.01) { c.restore(); return; }
        var a = (u0 * (y1 - y2) + u1 * (y2 - y0) + u2 * (y0 - y1)) / det;
        var b = (v0 * (y1 - y2) + v1 * (y2 - y0) + v2 * (y0 - y1)) / det;
        var cc = (u0 * (x2 - x1) + u1 * (x0 - x2) + u2 * (x1 - x0)) / det;
        var dd = (v0 * (x2 - x1) + v1 * (x0 - x2) + v2 * (x1 - x0)) / det;
        var e = u0 - a * x0 - cc * y0;
        var f = v0 - b * x0 - dd * y0;
        c.setTransform(a, b, cc, dd, e, f);
        c.drawImage(img, 0, 0);
        c.restore();
    }

    // --- Draw warped face ---
    function drawWarped(mainCtx, key, userLm, w, h) {
        var cfg = masks[key];
        if (!cfg.pts || !triangles) return;
        var img = maskImgs[key];
        if (!img || !img.complete) return;

        for (var i = 0; i < KEY.length; i++) {
            dstBuf[i].x = w - userLm[KEY[i]].x * w;
            dstBuf[i].y = userLm[KEY[i]].y * h;
        }

        if (warpCvs.width !== w) warpCvs.width = w;
        if (warpCvs.height !== h) warpCvs.height = h;
        warpCtx.setTransform(1, 0, 0, 1, 0, 0);
        warpCtx.globalCompositeOperation = 'source-over';
        warpCtx.clearRect(0, 0, w, h);

        var sp = cfg.pts;
        for (var i = 0; i < triangles.length; i++) {
            var t = triangles[i];
            warpTri(warpCtx, img,
                [sp[t[0]], sp[t[1]], sp[t[2]]],
                [dstBuf[t[0]], dstBuf[t[1]], dstBuf[t[2]]]
            );
        }

        var cx = 0, cy = 0, mnX = 1e9, mxX = -1e9, mnY = 1e9, mxY = -1e9;
        for (var i = 0; i < dstBuf.length; i++) {
            cx += dstBuf[i].x; cy += dstBuf[i].y;
            if (dstBuf[i].x < mnX) mnX = dstBuf[i].x;
            if (dstBuf[i].x > mxX) mxX = dstBuf[i].x;
            if (dstBuf[i].y < mnY) mnY = dstBuf[i].y;
            if (dstBuf[i].y > mxY) mxY = dstBuf[i].y;
        }
        cx /= dstBuf.length; cy /= dstBuf.length;
        var rx = (mxX - mnX) / 2 * 1.05, ry = (mxY - mnY) / 2 * 1.05;
        var r = Math.max(rx, ry);

        warpCtx.globalCompositeOperation = 'destination-in';
        warpCtx.save();
        warpCtx.setTransform(1, 0, 0, 1, 0, 0);
        warpCtx.translate(cx, cy);
        if (rx !== ry) warpCtx.scale(rx / r, ry / r);
        var g = warpCtx.createRadialGradient(0, 0, r * 0.6, 0, 0, r);
        g.addColorStop(0, 'rgba(0,0,0,1)');
        g.addColorStop(0.75, 'rgba(0,0,0,0.85)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        warpCtx.fillStyle = g;
        warpCtx.fillRect(-r * 2, -r * 2, r * 4, r * 4);
        warpCtx.restore();
        warpCtx.globalCompositeOperation = 'source-over';

        mainCtx.save();
        mainCtx.setTransform(1, 0, 0, 1, 0, 0);
        mainCtx.drawImage(warpCvs, 0, 0);
        mainCtx.restore();
    }

    // --- MediaPipe Holistic ---
    var holistic = new Holistic({
        locateFile: function(f) { return 'https://cdn.jsdelivr.net/npm/@mediapipe/holistic/' + f; }
    });
    holistic.setOptions({
        static_image_mode: true,
        model_complexity: 1,
        smooth_landmarks: true,
        refine_face_landmarks: true,
        min_detection_confidence: 0.5,
        min_tracking_confidence: 0.5
    });

    // --- Init: detect landmarks on source images, then start camera ---
    function waitImages(cb) {
        var keys = Object.keys(masks), done = 0, total = keys.length;
        function check() { if (++done >= total) cb(); }
        keys.forEach(function(k) {
            var im = maskImgs[k];
            if (im.complete && im.naturalWidth) check();
            else { im.onload = check; im.onerror = check; }
        });
    }

    function processSources() {
        var keys = Object.keys(masks), idx = 0;
        function next() {
            if (idx >= keys.length) { finishInit(); return; }
            var k = keys[idx];
            loadMsg.innerHTML = '<div class="loading-spinner"></div><br>Analyzing face ' + (idx + 1) + '/' + keys.length + '...';
            holistic.onResults(function(res) {
                if (res.faceLandmarks) {
                    var iw = maskImgs[k].naturalWidth, ih = maskImgs[k].naturalHeight;
                    masks[k].pts = KEY.map(function(li) {
                        return { x: res.faceLandmarks[li].x * iw, y: res.faceLandmarks[li].y * ih };
                    });
                }
                idx++;
                next();
            });
            holistic.send({ image: maskImgs[k] });
        }
        next();
    }

    function finishInit() {
        var fk = Object.keys(masks).find(function(k) { return masks[k].pts; });
        if (fk) triangles = computeDelaunay(masks[fk].pts);

        holistic.setOptions({ static_image_mode: false });
        holistic.onResults(onResults);
        loadMsg.innerHTML = '<div class="loading-spinner"></div><br>Starting camera...';
        startWebcam();
    }

    // --- Render ---
    function onResults(results) {
        loadMsg.style.display = 'none';
        var w = videoEl.videoWidth, h = videoEl.videoHeight;
        if (canvas.width !== w) { canvas.width = w; canvas.height = h; }

        var emo = detectEmotion(results.faceLandmarks);
        emoEmoji.textContent = emo.m;
        emoLabel.textContent = emo.e;
        emoPill.style.borderColor = emo.c;

        ctx.save();
        ctx.clearRect(0, 0, w, h);
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
        if (results.image) ctx.drawImage(results.image, 0, 0, w, h);
        if (showMesh) {
            drawConnectors(ctx, results.faceLandmarks, FACEMESH_TESSELATION, { color: '#C0C0C070', lineWidth: 1 });
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
            drawLandmarks(ctx, results.poseLandmarks, { color: '#FF0000', lineWidth: 2, radius: 2 });
            drawConnectors(ctx, results.leftHandLandmarks, HAND_CONNECTIONS, { color: '#CC0000', lineWidth: 5 });
            drawLandmarks(ctx, results.leftHandLandmarks, { color: '#FF0000', lineWidth: 2, radius: 2 });
            drawConnectors(ctx, results.rightHandLandmarks, HAND_CONNECTIONS, { color: '#00CC00', lineWidth: 5 });
            drawLandmarks(ctx, results.rightHandLandmarks, { color: '#00FF00', lineWidth: 2, radius: 2 });
        }
        ctx.restore();

        if (activeFilter !== 'none' && results.faceLandmarks) {
            drawWarped(ctx, activeFilter, results.faceLandmarks, w, h);
        }

        if (results.faceLandmarks && emo.e !== 'Neutral' && emo.e !== 'No Face') {
            ctx.save();
            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(emo.m, w - results.faceLandmarks[10].x * w, results.faceLandmarks[10].y * h - 60);
            ctx.restore();
        }
    }

    function startWebcam() {
        var cam = new Camera(videoEl, {
            onFrame: async function() {
                if (videoEl.readyState >= 2) await holistic.send({ image: videoEl });
            },
            facingMode: 'user'
        });
        cam.start().then(function() { console.log('Ready.'); }).catch(function() {
            loadMsg.innerText = 'Camera Access Denied.';
            loadMsg.style.display = 'block';
        });
    }

    window.onload = function() { waitImages(processSources); };
    </script>
</body>
</html>
